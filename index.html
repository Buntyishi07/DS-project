<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <title>Movie Booking System - Advanced UI</title>
  <style>
   body {
  font-family: 'Poppins', Arial;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  text-align: center;
  padding: 30px;
  color: #fff;
}

h1 {
  margin-bottom: 10px;
  font-size: 32px;
  letter-spacing: 1px;
}

.container {
  max-width: 950px;
  margin: auto;
}

/* INPUT */
input {
  padding: 12px;
  width: 260px;
  border-radius: 8px;
  border: none;
  outline: none;
  margin-top: 10px;
  font-size: 14px;
}

/* BUTTONS */
button {
  padding: 10px 18px;
  margin: 8px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #ff7eb3, #ff758c);
  color: #fff;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

/* PANELS (Glass Effect) */
.panel {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.panel:hover {
  transform: translateY(-5px);
}

/* SEATS */
.seats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 15px;
}

.seat {
  padding: 15px;
  border-radius: 10px;
  background: linear-gradient(45deg, #43e97b, #38f9d7);
  color: #000;
  font-weight: bold;
  transition: 0.3s;
}

.seat:hover {
  transform: scale(1.1);
}

.seat.booked {
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  color: #fff;
}

/* QUEUE + HISTORY */
.queue, .history {
  text-align: left;
}

.item {
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  background: rgba(255,255,255,0.15);
  transition: 0.3s;
}

.item:hover {
  transform: translateX(5px);
  background: rgba(255,255,255,0.25);
}

/* OUTPUT MESSAGE */
#output {
  margin-top: 15px;
  font-weight: bold;
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  display: inline-block;
}
  </style>
</head>

<body>
<div class="container">
  <h1>🎬 Movie Ticket Booking System</h1>

  <input id="username" placeholder="Enter your name" />
  <br>
  <button onclick="requestBooking()">Request Booking</button>
  <button onclick="processBooking()">Process Booking</button>
  <button onclick="cancelBooking()">Cancel Booking</button>

  <div id="output">System Ready</div>

  <div class="panel">
    <h3>🎟 Seats</h3>
    <div id="seats" class="seats"></div>
  </div>

  <div class="panel">
    <h3>👥 Waiting Queue</h3>
    <div id="queue" class="queue"></div>
  </div>

  <div class="panel">
    <h3>📜 Booking History</h3>
    <div id="history" class="history"></div>
  </div>
</div>

<script>
// ===== DSA =====
class Stack { constructor(){this.items=[];} push(e){this.items.push(e);} pop(){return this.items.pop();} }
class Queue { constructor(){this.items=[];} enqueue(e){this.items.push(e);} dequeue(){return this.items.shift();} }
class CircularQueue {
  constructor(size){ this.size=size; this.queue=new Array(size); this.front=-1; this.rear=-1; }
  enqueue(v){ if((this.rear+1)%this.size===this.front) return null; if(this.front===-1) this.front=0; this.rear=(this.rear+1)%this.size; this.queue[this.rear]=v; return true; }
  dequeue(){ if(this.front===-1) return null; let v=this.queue[this.front]; if(this.front===this.rear){this.front=this.rear=-1;} else {this.front=(this.front+1)%this.size;} return v; }
}

// ===== SYSTEM =====
class MovieBookingSystem {
  constructor(){
    this.waitingQueue=new Queue();
    this.confirmedBookings=new Stack();
    this.availableSeats=new CircularQueue(5);
    this.allSeats=["Seat-1","Seat-2","Seat-3","Seat-4","Seat-5"];
    this.bookedSet=new Set();
    for(let i=1;i<=5;i++){ this.availableSeats.enqueue("Seat-"+i); }
  }

  requestBooking(user){
    if(!user) return "Enter name first";
    this.waitingQueue.enqueue(user);
    return user+" added to queue";
  }

  processBooking(){
    let user=this.waitingQueue.dequeue();
    if(!user) return "No users in queue";
    let seat=this.availableSeats.dequeue();
    if(!seat) return "No seats available";
    this.confirmedBookings.push({user,seat});
    this.bookedSet.add(seat);
    return user+" booked "+seat;
  }

  cancelBooking(){
    let b=this.confirmedBookings.pop();
    if(!b) return "No bookings to cancel";
    this.availableSeats.enqueue(b.seat);
    this.bookedSet.delete(b.seat);
    return "Cancelled "+b.user;
  }
}

const system=new MovieBookingSystem();

// ===== UI =====
function requestBooking(){
  let name=document.getElementById("username").value;
  setMsg(system.requestBooking(name));
  render();
}

function processBooking(){ setMsg(system.processBooking()); render(); }
function cancelBooking(){ setMsg(system.cancelBooking()); render(); }

function setMsg(m){ document.getElementById("output").innerText=m; }

function render(){
  renderSeats();
  renderQueue();
  renderHistory();
}

function renderSeats(){
  let el=document.getElementById("seats");
  el.innerHTML="";
  system.allSeats.forEach(s=>{
    let div=document.createElement("div");
    div.className="seat"+(system.bookedSet.has(s)?" booked":"");
    div.innerText=s;
    el.appendChild(div);
  });
}

function renderQueue(){
  let el=document.getElementById("queue");
  el.innerHTML="";
  system.waitingQueue.items.forEach(u=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerText=u;
    el.appendChild(div);
  });
}

function renderHistory(){
  let el=document.getElementById("history");
  el.innerHTML="";
  system.confirmedBookings.items.forEach(b=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerText=b.user+" → "+b.seat;
    el.appendChild(div);
  });
}
  document.querySelectorAll(".item, .seat").forEach(el => {
  el.style.opacity = 0;
  setTimeout(() => el.style.opacity = 1, 100);
});

render();
</script>

</body>
</html>
