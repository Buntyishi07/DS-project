<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Movie Booking System</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #333;
    }

    input {
      padding: 10px;
      width: 200px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-height: 50px;
    }
  </style>
</head>

<body>

<h1>🎬 Movie Ticket Booking System</h1>

<input id="username" placeholder="Enter your name" />
<br>

<button onclick="requestBooking()">Request Booking</button>
<button onclick="processBooking()">Process Booking</button>
<button onclick="cancelBooking()">Cancel Booking</button>
<button onclick="showBookings()">Show Bookings</button>

<div id="output">System Ready...</div>

<script>
// ===== DSA CLASSES =====
class Stack {
  constructor() { this.items = []; }
  push(e) { this.items.push(e); }
  pop() { return this.items.pop(); }
}

class Queue {
  constructor() { this.items = []; }
  enqueue(e) { this.items.push(e); }
  dequeue() { return this.items.shift(); }
}

class CircularQueue {
  constructor(size) {
    this.size = size;
    this.queue = new Array(size);
    this.front = -1;
    this.rear = -1;
  }

  enqueue(value) {
    if ((this.rear + 1) % this.size === this.front) return null;
    if (this.front === -1) this.front = 0;
    this.rear = (this.rear + 1) % this.size;
    this.queue[this.rear] = value;
    return true;
  }

  dequeue() {
    if (this.front === -1) return null;
    let value = this.queue[this.front];
    if (this.front === this.rear) {
      this.front = this.rear = -1;
    } else {
      this.front = (this.front + 1) % this.size;
    }
    return value;
  }
}

// ===== SYSTEM =====
class MovieBookingSystem {
  constructor() {
    this.waitingQueue = new Queue();
    this.confirmedBookings = new Stack();
    this.availableSeats = new CircularQueue(5);

    for (let i = 1; i <= 5; i++) {
      this.availableSeats.enqueue("Seat-" + i);
    }
  }

  requestBooking(user) {
    if (!user) return "⚠️ Enter a name first!";
    this.waitingQueue.enqueue(user);
    return user + " added to queue";
  }

  processBooking() {
    let user = this.waitingQueue.dequeue();
    if (!user) return "No users in queue";

    let seat = this.availableSeats.dequeue();
    if (!seat) return "No seats available";

    this.confirmedBookings.push({ user, seat });
    return "✅ " + user + " booked " + seat;
  }

  cancelBooking() {
    let booking = this.confirmedBookings.pop();
    if (!booking) return "No bookings to cancel";

    this.availableSeats.enqueue(booking.seat);
    return "❌ Cancelled booking of " + booking.user;
  }

  getBookings() {
    return this.confirmedBookings.items;
  }
}

const system = new MovieBookingSystem();

// ===== UI =====
function requestBooking() {
  const name = document.getElementById("username").value;
  updateOutput(system.requestBooking(name));
}

function processBooking() {
  updateOutput(system.processBooking());
}

function cancelBooking() {
  updateOutput(system.cancelBooking());
}

function showBookings() {
  const bookings = system.getBookings();

  if (bookings.length === 0) {
    updateOutput("No bookings yet");
    return;
  }

  let html = "<h3>🎟 Booking History</h3>";

  bookings.forEach((b, index) => {
    html += `
      <div style="
        background:#f9f9f9;
        margin:10px;
        padding:10px;
        border-radius:6px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1)
      ">
        <strong>User:</strong> ${b.user} <br>
        <strong>Seat:</strong> ${b.seat}
      </div>
    `;
  });

  document.getElementById("output").innerHTML = html;
}

function updateOutput(msg) {
  document.getElementById("output").innerText = msg;
}
</script>

</body>
</html>
